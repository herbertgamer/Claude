<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandschutzbegehung – Checkliste</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      color: #c0392b;
    }

    header p {
      color: #555;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 750px;
      margin: 0 auto 2rem;
      background: #fff;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .meta-bar label {
      font-size: 0.85rem;
      color: #555;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 160px;
    }

    .meta-bar input {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      font-size: 0.9rem;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .section {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #c0392b;
      color: #fff;
      padding: 0.75rem 1.2rem;
      font-weight: 600;
      font-size: 1rem;
    }

    .section-header .icon {
      font-size: 1.2rem;
    }

    .section-header .section-count {
      margin-left: auto;
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item:hover {
      background: #fef9f9;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #c0392b;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }

    .item-text {
      flex: 1;
    }

    .item-text strong {
      display: block;
      font-size: 0.95rem;
    }

    .item-text span {
      font-size: 0.82rem;
      color: #777;
      margin-top: 2px;
      display: block;
    }

    .item.checked .item-text strong {
      text-decoration: line-through;
      color: #aaa;
    }

    .item.checked .item-text span {
      color: #ccc;
    }

    .remark-field {
      padding: 0 1.2rem 0.8rem 3.4rem;
      display: none;
    }

    .remark-field.visible {
      display: block;
    }

    .remark-field textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 0.4rem 0.6rem;
      font-size: 0.82rem;
      resize: vertical;
      min-height: 50px;
      color: #333;
    }

    .remark-toggle {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      margin-left: 3.4rem;
      margin-bottom: 0.6rem;
    }

    .progress-bar-wrapper {
      max-width: 750px;
      margin: 0 auto 0.8rem;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      margin-bottom: 6px;
      color: #555;
    }

    .progress-info #progress-label {
      font-weight: 600;
      color: #c0392b;
    }

    .progress-bar {
      height: 12px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      border-radius: 10px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .summary-box {
      max-width: 750px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 1.2rem 1.5rem;
      text-align: center;
    }

    .summary-box h2 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .summary-box .score {
      font-size: 2.5rem;
      font-weight: 700;
      color: #c0392b;
    }

    .summary-box .score-label {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 1rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .status-ok     { background: #d4efdf; color: #1e8449; }
    .status-warn   { background: #fdebd0; color: #ca6f1e; }
    .status-danger { background: #fadbd8; color: #c0392b; }

    .btn-print {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1.4rem;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-print:hover {
      background: #a93226;
    }

    .btn-reset {
      display: inline-block;
      margin-top: 1rem;
      margin-left: 0.8rem;
      padding: 0.55rem 1.4rem;
      background: #fff;
      color: #c0392b;
      border: 2px solid #c0392b;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-reset:hover {
      background: #fef9f9;
    }

    @media print {
      body { background: #fff; padding: 0.5rem; }
      .btn-print, .btn-reset, .remark-toggle { display: none; }
      .section { box-shadow: none; border: 1px solid #ddd; }
      .meta-bar { box-shadow: none; border: 1px solid #ddd; }
      .summary-box { box-shadow: none; border: 1px solid #ddd; }
      .remark-field { display: block !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>Brandschutzbegehung</h1>
  <p>Checkliste zur systematischen Kontrolle des vorbeugenden Brandschutzes</p>
</header>

<div class="meta-bar">
  <label>Datum
    <input type="date" id="meta-date">
  </label>
  <label>Gebäude / Bereich
    <input type="text" id="meta-building" placeholder="z. B. Hauptgebäude, EG">
  </label>
  <label>Prüfer / Prüferin
    <input type="text" id="meta-inspector" placeholder="Name">
  </label>
</div>

<div class="progress-bar-wrapper">
  <div class="progress-info">
    <span id="progress-label">0 von 0 Punkten erledigt</span>
    <span id="progress-percent">0 %</span>
  </div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
</div>

<div class="container" id="checklist-container"></div>

<div class="summary-box" style="margin-top:1.5rem;">
  <h2>Ergebnis der Begehung</h2>
  <div class="score" id="summary-score">0 / 0</div>
  <div class="score-label">Punkte erfüllt</div>
  <div id="summary-badge" class="status-badge status-danger">Begehung nicht abgeschlossen</div>
  <br>
  <button class="btn-print" onclick="window.print()">Drucken / Als PDF speichern</button>
  <button class="btn-reset" onclick="resetAll()">Zurücksetzen</button>
</div>

<script>
  const sections = [
    {
      title: "Fluchtwege & Notausgänge",
      icon: "🚪",
      items: [
        { id: "fw1", label: "Fluchtwege freigehalten", hint: "Keine Hindernisse, Möbel oder Lagerung im Fluchtweg" },
        { id: "fw2", label: "Fluchttüren ungehindert zu öffnen", hint: "Türen sind von innen ohne Schlüssel zu öffnen" },
        { id: "fw3", label: "Fluchtweg-Beschilderung vorhanden & gut sichtbar", hint: "Grüne Rettungszeichen nach ISO 7010 (E001/E002)" },
        { id: "fw4", label: "Sammelplatz ausgeschildert & bekannt", hint: "Sammelplatz ist beschildert und Mitarbeitenden kommuniziert" },
        { id: "fw5", label: "Flucht- und Rettungsplan ausgehängt", hint: "Aktueller Plan je Stockwerk/Bereich vorhanden" },
      ]
    },
    {
      title: "Feuerlöscher",
      icon: "🧯",
      items: [
        { id: "fl1", label: "Feuerlöscher vorhanden und gut zugänglich", hint: "An den ausgewiesenen Standorten, nicht verdeckt" },
        { id: "fl2", label: "Feuerlöscher ordnungsgemäß beschildert", hint: "Rotes Hinweisschild nach ISO 7010 (F001)" },
        { id: "fl3", label: "Prüfplakette aktuell (nicht überfällig)", hint: "Nächste Prüfung liegt nicht in der Vergangenheit" },
        { id: "fl4", label: "Füllgewicht / Druck in Ordnung", hint: "Druckanzeige im grünen Bereich, keine Beschädigungen" },
        { id: "fl5", label: "Löscher für den jeweiligen Brandklassenbereich geeignet", hint: "Brandklassen A, B, C, D, F berücksichtigt" },
      ]
    },
    {
      title: "Notbeleuchtung & Sicherheitsstromversorgung",
      icon: "💡",
      items: [
        { id: "nb1", label: "Notbeleuchtung in Fluchtwegen vorhanden", hint: "Alle Fluchtwege und Treppenhäuser beleuchtet" },
        { id: "nb2", label: "Notbeleuchtung funktioniert (Testmodus)", hint: "Kurzer Funktionstest oder Kontrollleuchte grün" },
        { id: "nb3", label: "Akkus / Batterien in Ordnung", hint: "Letzte Prüfung nicht überfällig, keine Defektanzeigen" },
        { id: "nb4", label: "Sicherheitsstromversorgung geprüft", hint: "USV oder Generator für Sicherheitssysteme funktionsfähig" },
      ]
    },
    {
      title: "Brandschutztüren & -abschnitte",
      icon: "🔥",
      items: [
        { id: "bt1", label: "Brandschutztüren selbstschließend und nicht festgestellt", hint: "Türen dürfen nicht mit Keilen oder Magneten blockiert sein" },
        { id: "bt2", label: "Türdichtungen und Schließmechanismus intakt", hint: "Keine sichtbaren Schäden an Türblatt, Rahmen oder Dichtung" },
        { id: "bt3", label: "Brandschnittstellen (Kabelwände, Decken) abgedichtet", hint: "Keine offenen Durchbrüche in Brandwänden" },
        { id: "bt4", label: "Rauchmelder in Brandabschnitten funktionsfähig", hint: "Kontrolllampe leuchtet / Testknopf geprüft" },
      ]
    },
    {
      title: "Elektrische Anlagen & Gefahrenquellen",
      icon: "⚡",
      items: [
        { id: "el1", label: "Keine überlasteten Steckdosenleisten", hint: "Mehrfachbelegung von Verlängerungskabeln vermeiden" },
        { id: "el2", label: "Schaltschränke zugänglich und unbeschädigt", hint: "Keine Lagerung vor Schaltschränken" },
        { id: "el3", label: "Leicht entzündliche Stoffe ordnungsgemäß gelagert", hint: "Gefahrstoffe in zugelassenen Schränken, keine Ansammlungen" },
        { id: "el4", label: "Brandlasten (Papier, Karton) reduziert", hint: "Keine großen Mengen brennbarer Materialien angehäuft" },
      ]
    },
    {
      title: "Brandmeldanlage & Alarm",
      icon: "🔔",
      items: [
        { id: "bm1", label: "Brandmeldezentrale ohne Störmeldung", hint: "Anzeigefeld zeigt keinen Fehler oder Alarm" },
        { id: "bm2", label: "Manuelle Druckknopfmelder zugänglich & unbeschädigt", hint: "Melder nicht verdeckt, Glasscheibe intakt" },
        { id: "bm3", label: "Alarmierungsplan aktuell & ausgehängt", hint: "Wer alarmiert wen? Was ist zu tun?" },
        { id: "bm4", label: "Mitarbeitende mit Verhalten im Brandfall vertraut", hint: "Letzte Unterweisung dokumentiert, nicht älter als 12 Monate" },
      ]
    },
  ];

  let totalItems = 0;
  sections.forEach(s => totalItems += s.items.length);

  function buildChecklist() {
    const container = document.getElementById('checklist-container');
    container.innerHTML = '';

    sections.forEach(section => {
      const sec = document.createElement('div');
      sec.className = 'section';
      sec.dataset.sectionId = section.title;

      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `<span class="icon">${section.icon}</span> ${section.title}
        <span class="section-count" id="count-${section.title}">0 / ${section.items.length}</span>`;
      sec.appendChild(header);

      section.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item';
        row.id = `row-${item.id}`;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = item.id;
        cb.addEventListener('change', () => onCheck(item.id, section.title));

        const text = document.createElement('div');
        text.className = 'item-text';
        text.innerHTML = `<strong>${item.label}</strong><span>${item.hint}</span>`;

        row.appendChild(cb);
        row.appendChild(text);
        row.addEventListener('click', (e) => {
          if (e.target !== cb) { cb.checked = !cb.checked; onCheck(item.id, section.title); }
        });

        sec.appendChild(row);

        // Remark toggle + textarea
        const toggle = document.createElement('button');
        toggle.className = 'remark-toggle';
        toggle.textContent = '+ Bemerkung hinzufügen';
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          const rf = document.getElementById(`remark-${item.id}`);
          rf.classList.toggle('visible');
          toggle.textContent = rf.classList.contains('visible') ? '- Bemerkung ausblenden' : '+ Bemerkung hinzufügen';
        });
        sec.appendChild(toggle);

        const remarkField = document.createElement('div');
        remarkField.className = 'remark-field';
        remarkField.id = `remark-${item.id}`;
        remarkField.innerHTML = `<textarea placeholder="Bemerkung / Mangelbeschreibung …"></textarea>`;
        sec.appendChild(remarkField);
      });

      container.appendChild(sec);
    });

    updateProgress();
  }

  function onCheck(itemId, sectionTitle) {
    const cb = document.getElementById(itemId);
    const row = document.getElementById(`row-${itemId}`);
    row.classList.toggle('checked', cb.checked);
    updateSectionCount(sectionTitle);
    updateProgress();
  }

  function updateSectionCount(sectionTitle) {
    const section = sections.find(s => s.title === sectionTitle);
    if (!section) return;
    const done = section.items.filter(i => document.getElementById(i.id)?.checked).length;
    const el = document.getElementById(`count-${sectionTitle}`);
    if (el) el.textContent = `${done} / ${section.items.length}`;
  }

  function updateProgress() {
    let done = 0;
    sections.forEach(s => s.items.forEach(i => { if (document.getElementById(i.id)?.checked) done++; }));

    const pct = totalItems > 0 ? Math.round((done / totalItems) * 100) : 0;
    document.getElementById('progress-label').textContent = `${done} von ${totalItems} Punkten erledigt`;
    document.getElementById('progress-percent').textContent = `${pct} %`;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('summary-score').textContent = `${done} / ${totalItems}`;

    const badge = document.getElementById('summary-badge');
    if (pct === 100) {
      badge.textContent = 'Alle Punkte erfüllt – Begehung abgeschlossen';
      badge.className = 'status-badge status-ok';
    } else if (pct >= 75) {
      badge.textContent = `${100 - pct} % der Punkte noch offen`;
      badge.className = 'status-badge status-warn';
    } else {
      badge.textContent = done === 0 ? 'Begehung nicht abgeschlossen' : `${100 - pct} % der Punkte noch offen`;
      badge.className = 'status-badge status-danger';
    }
  }

  function resetAll() {
    if (!confirm('Alle Häkchen und Bemerkungen zurücksetzen?')) return;
    sections.forEach(s => s.items.forEach(i => {
      const cb = document.getElementById(i.id);
      if (cb) cb.checked = false;
      const row = document.getElementById(`row-${i.id}`);
      if (row) row.classList.remove('checked');
      const rf = document.getElementById(`remark-${i.id}`);
      if (rf) { rf.classList.remove('visible'); rf.querySelector('textarea').value = ''; }
    }));
    sections.forEach(s => updateSectionCount(s.title));
    updateProgress();
  }

  // Set today's date by default
  document.getElementById('meta-date').valueAsDate = new Date();

  buildChecklist();
</script>
</body>
</html>
